<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Ayush Jaipuriar favicon">
  <style>
    :root {
      /* Default colors: Dark Mode (Graphite and Signal Green) */
      --bg-color-1: #0b0d0c;
      --bg-color-2: #171d19;
      --ring-color-1: #31df82;
      --ring-color-2: #18a058;
      --text-color-1: #31df82;
      --text-color-2: #18a058;
    }
    @media (prefers-color-scheme: light) {
      :root {
        /* Light Mode colors: White/Slate and Vermilion */
        --bg-color-1: #ffffff;
        --bg-color-2: #f1f5f9;
        --ring-color-1: #f15942;
        --ring-color-2: #e34234;
        --text-color-1: #f15942;
        --text-color-2: #e34234;
      }
    }
    .bg { fill: url(#bg-grad); }
    .ring { stroke: url(#ring-grad); }
    .text-val { fill: url(#text-grad); }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--bg-color-1)" />
      <stop offset="100%" stop-color="var(--bg-color-2)" />
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--ring-color-1)" />
      <stop offset="100%" stop-color="var(--ring-color-2)" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="var(--text-color-1)" />
      <stop offset="100%" stop-color="var(--text-color-2)" />
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" class="bg" />
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" class="ring" stroke-width="2.5" />
  <text
    x="32"
    y="41"
    text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="24"
    font-weight="700"
    class="text-val"
  >
    AJ
  </text>
</svg>
