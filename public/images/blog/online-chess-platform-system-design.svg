<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient: Deep Graphite -->
    <linearGradient id="bg" x1="80" y1="40" x2="1120" y2="590" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0D0C"/>
      <stop offset="1" stop-color="#171D19"/>
    </linearGradient>
    <!-- Standard Card Gradient -->
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#2C332C"/>
      <stop offset="1" stop-color="#1D231F"/>
    </linearGradient>
    <!-- Accent Highlight Card Gradient: Signal Green -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#31DF82"/>
      <stop offset="1" stop-color="#0F8547"/>
    </linearGradient>
    <!-- Event Stream Gradient -->
    <linearGradient id="stream" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#1E293B"/>
      <stop offset="0.5" stop-color="#334155"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#052719" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Outer canvas -->
  <rect width="1200" height="630" rx="36" fill="url(#bg)"/>
  <rect x="36" y="36" width="1128" height="558" rx="28" stroke="#2C332C" stroke-width="2"/>

  <!-- Title & Subtitle -->
  <text x="72" y="85" fill="#F6F7F4" font-family="'Inter', Arial, sans-serif" font-size="36" font-weight="700">
    Online Chess Platform System Design
  </text>
  <text x="72" y="120" fill="#aeb8aa" font-family="'Inter', Arial, sans-serif" font-size="18">
    Server-authoritative game loops, real-time WebSockets, and asynchronous pipelines.
  </text>
  <text x="830" y="98" fill="#31DF82" font-family="'Inter', Arial, sans-serif" font-size="18" font-weight="700" text-anchor="end">
    1M DAU | 20K Peak Connections | 20K moves/sec
  </text>

  <!-- Level 1 Cards: Edge and Routing Plane -->
  <g filter="url(#shadow)">
    <!-- Client Apps -->
    <rect x="72" y="160" width="180" height="85" rx="20" fill="url(#card)" stroke="#3F473D" stroke-width="1.5"/>
    <text x="162" y="195" fill="#F6F7F4" font-family="'Inter', Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Client Apps</text>
    <text x="162" y="215" fill="#aeb8aa" font-family="'Inter', Arial, sans-serif" font-size="12" text-anchor="middle">Web &amp; Mobile Clients</text>
    <text x="162" y="230" fill="#aeb8aa" font-family="'Inter', Arial, sans-serif" font-size="11" text-anchor="middle">WebSocket / HTTP</text>

    <!-- Dumb WS Gateway -->
    <rect x="292" y="160" width="220" height="85" rx="20" fill="url(#card)" stroke="#3F473D" stroke-width="1.5"/>
    <text x="402" y="195" fill="#F6F7F4" font-family="'Inter', Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Dumb WS Gateway</text>
    <text x="402" y="215" fill="#aeb8aa" font-family="'Inter', Arial, sans-serif" font-size="12" text-anchor="middle">TLS termination, Auth check</text>
    <text x="402" y="230" fill="#aeb8aa" font-family="'Inter', Arial, sans-serif" font-size="11" text-anchor="middle">Stable long-lived socket fleet</text>

    <!-- Connection Service -->
    <rect x="552" y="160" width="230" height="85" rx="20" fill="url(#card)" stroke="#3F473D" stroke-width="1.5"/>
    <text x="667" y="195" fill="#F6F7F4" font-family="'Inter', Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Connection Service</text>
    <text x="667" y="215" fill="#aeb8aa" font-family="'Inter', Arial, sans-serif" font-size="12" text-anchor="middle">Dynamic message routing</text>
    <text x="667" y="230" fill="#aeb8aa" font-family="'Inter', Arial, sans-serif" font-size="11" text-anchor="middle">Presence &amp; session manager</text>

    <!-- Redis Registry -->
    <rect x="822" y="160" width="306" height="85" rx="20" fill="url(#card)" stroke="#3F473D" stroke-width="1.5"/>
    <text x="975" y="195" fill="#F6F7F4" font-family="'Inter', Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Redis Registry</text>
    <text x="975" y="215" fill="#aeb8aa" font-family="'Inter', Arial, sans-serif" font-size="12" text-anchor="middle">userId → gatewayId, connectionId</text>
    <text x="975" y="230" fill="#aeb8aa" font-family="'Inter', Arial, sans-serif" font-size="11" text-anchor="middle">Ephemeral session state with TTL</text>
  </g>

  <!-- Level 2 Cards: Gameplay Core -->
  <g filter="url(#shadow)">
    <!-- Match Engine -->
    <rect x="292" y="295" width="220" height="85" rx="20" fill="url(#card)" stroke="#3F473D" stroke-width="1.5"/>
    <text x="402" y="330" fill="#F6F7F4" font-family="'Inter', Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Match Engine</text>
    <text x="402" y="350" fill="#aeb8aa" font-family="'Inter', Arial, sans-serif" font-size="12" text-anchor="middle">Rating range / time control</text>
    <text x="402" y="365" fill="#aeb8aa" font-family="'Inter', Arial, sans-serif" font-size="11" text-anchor="middle">In-memory sorted sets / TTL</text>

    <!-- Game Engine Shards (Main Highlight Accent Card) -->
    <rect x="552" y="295" width="230" height="85" rx="20" fill="url(#accent)" stroke="#72f7b1" stroke-width="2"/>
    <text x="667" y="330" fill="#0b0d0c" font-family="'Inter', Arial, sans-serif" font-size="19" font-weight="800" text-anchor="middle">Game Engine</text>
    <text x="667" y="350" fill="#0b0d0c" font-family="'Inter', Arial, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Authoritative logic &amp; clocks</text>
    <text x="667" y="365" fill="#0b0d0c" font-family="'Inter', Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Shard by gameId (In-Memory)</text>

    <!-- Durable Move Log -->
    <rect x="822" y="295" width="306" height="85" rx="20" fill="url(#card)" stroke="#3F473D" stroke-width="1.5"/>
    <text x="975" y="330" fill="#F6F7F4" font-family="'Inter', Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Durable Move Log</text>
    <text x="975" y="350" fill="#aeb8aa" font-family="'Inter', Arial, sans-serif" font-size="12" text-anchor="middle">Append-only DB (No SQL / Cassandra)</text>
    <text x="975" y="365" fill="#aeb8aa" font-family="'Inter', Arial, sans-serif" font-size="11" text-anchor="middle">Replay log for server recovery</text>
  </g>

  <!-- Level 3 Card: Event Stream -->
  <g filter="url(#shadow)">
    <rect x="292" y="430" width="490" height="50" rx="15" fill="url(#stream)" stroke="#475569" stroke-width="1.5"/>
    <text x="537" y="461" fill="#F8FAFC" font-family="'Inter', Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle">
      Event Stream (Kafka / RabbitMQ / PubSub)
    </text>
  </g>

  <!-- Level 4 Cards: Async Consumers -->
  <g filter="url(#shadow)">
    <!-- Spectator Service -->
    <rect x="72" y="520" width="220" height="70" rx="16" fill="url(#card)" stroke="#3F473D" stroke-width="1.5"/>
    <text x="182" y="550" fill="#F6F7F4" font-family="'Inter', Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Spectator Service</text>
    <text x="182" y="570" fill="#aeb8aa" font-family="'Inter', Arial, sans-serif" font-size="11" text-anchor="middle">Isolated viewer fanout path</text>

    <!-- Rating Engine -->
    <rect x="332" y="520" width="220" height="70" rx="16" fill="url(#card)" stroke="#3F473D" stroke-width="1.5"/>
    <text x="442" y="550" fill="#F6F7F4" font-family="'Inter', Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Rating Engine</text>
    <text x="442" y="570" fill="#aeb8aa" font-family="'Inter', Arial, sans-serif" font-size="11" text-anchor="middle">Idempotent Elo/Glicko update</text>

    <!-- Game Analyzer -->
    <rect x="592" y="520" width="220" height="70" rx="16" fill="url(#card)" stroke="#3F473D" stroke-width="1.5"/>
    <text x="702" y="550" fill="#F6F7F4" font-family="'Inter', Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Game Analyzer</text>
    <text x="702" y="570" fill="#aeb8aa" font-family="'Inter', Arial, sans-serif" font-size="11" text-anchor="middle">Stockfish engine processing</text>

    <!-- Cheating Checker -->
    <rect x="852" y="520" width="276" height="70" rx="16" fill="url(#card)" stroke="#3F473D" stroke-width="1.5"/>
    <text x="990" y="550" fill="#F6F7F4" font-family="'Inter', Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Cheating Checker</text>
    <text x="990" y="570" fill="#aeb8aa" font-family="'Inter', Arial, sans-serif" font-size="11" text-anchor="middle">ML anomaly &amp; engine similarity</text>
  </g>

  <!-- Connective Arrows & Lines (Signal Green Color & Blue-Gray) -->
  <!-- Level 1 Connections -->
  <g stroke="#31DF82" stroke-width="3" stroke-linecap="round" fill="none">
    <!-- Client to Gateway (Bidirectional) -->
    <path d="M 252 202.5 H 292"/>
    <!-- Gateway to Connection Service -->
    <path d="M 512 202.5 H 552"/>
    <!-- Connection Service to Redis (Bidirectional) -->
    <path d="M 782 202.5 H 822"/>
  </g>
  <!-- Arrowheads -->
  <g fill="#31DF82">
    <!-- Client to Gateway arrows -->
    <polygon points="257,197 257,208 247,202.5"/>
    <polygon points="287,197 287,208 297,202.5"/>
    <!-- Gateway to Connection Service arrow -->
    <polygon points="547,197 547,208 557,202.5"/>
    <!-- Connection Service to Redis arrows -->
    <polygon points="787,197 787,208 777,202.5"/>
    <polygon points="817,197 817,208 827,202.5"/>
  </g>

  <!-- Vertical & Cross Connections (Gameplay & Matchmaking) -->
  <g stroke="#31DF82" stroke-width="3" stroke-linecap="round" fill="none">
    <!-- Connection Service to Game Engine -->
    <path d="M 667 245 V 295"/>
    <!-- Connection Service to Match Engine (Diagonal) -->
    <path d="M 610 245 C 570 270 480 270 430 295"/>
    <!-- Match Engine to Game Engine -->
    <path d="M 512 337.5 H 552"/>
    <!-- Game Engine to Durable Move Log -->
    <path d="M 782 337.5 H 822"/>
    <!-- Game Engine to Event Stream -->
    <path d="M 667 380 V 430"/>
  </g>
  <g fill="#31DF82">
    <!-- Connection Service to Game Engine arrow -->
    <polygon points="661,290 673,290 667,300"/>
    <!-- Connection Service to Match Engine arrow -->
    <polygon points="426,290 435,280 434,297"/>
    <!-- Match Engine to Game Engine arrow -->
    <polygon points="547,332 547,343 557,337.5"/>
    <!-- Game Engine to Durable Move Log arrows (Bidirectional) -->
    <polygon points="787,332 787,343 777,337.5"/>
    <polygon points="817,332 817,343 827,337.5"/>
    <!-- Game Engine to Event Stream arrow -->
    <polygon points="661,425 673,425 667,435"/>
  </g>

  <!-- Event Stream Fanout Connections (Asynchronous Plane) -->
  <g stroke="#475569" stroke-width="2.5" stroke-dasharray="4 4" stroke-linecap="round" fill="none">
    <!-- Stream to Spectator -->
    <path d="M 537 480 C 537 500 182 500 182 520"/>
    <!-- Stream to Rating -->
    <path d="M 537 480 C 537 500 442 500 442 520"/>
    <!-- Stream to Analyzer -->
    <path d="M 537 480 C 537 500 702 500 702 520"/>
    <!-- Stream to Cheating -->
    <path d="M 537 480 C 537 500 990 500 990 520"/>
  </g>
  <g fill="#475569">
    <polygon points="177,515 187,515 182,522"/>
    <polygon points="437,515 447,515 442,522"/>
    <polygon points="697,515 707,515 702,522"/>
    <polygon points="985,515 995,515 990,522"/>
  </g>

  <!-- Spectator Service Isolated Fanout to Clients -->
  <g stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round" fill="none">
    <!-- Spectator Service back up to Clients -->
    <path d="M 162 520 V 245"/>
  </g>
  <g fill="#94A3B8">
    <polygon points="157,250 167,250 162,243"/>
  </g>
  <!-- Text Label for Spectator Path -->
  <rect x="80" y="375" width="165" height="22" rx="6" fill="#171D19" stroke="#3F473D" stroke-width="1"/>
  <text x="162.5" y="390" fill="#aeb8aa" font-family="'Inter', Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">
    Isolated Spectator Path
  </text>
</svg>
