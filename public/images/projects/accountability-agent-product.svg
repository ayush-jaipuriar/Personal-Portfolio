<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Accountability Agent product visual</title>
  <desc id="desc">A dark product composition showing a Telegram check-in, supervisor agent routing, pattern detection, and weekly report cards.</desc>
  <rect width="1200" height="675" fill="#07111F"/>
  <rect x="0" y="0" width="1200" height="675" fill="url(#bg)"/>

  <circle cx="1000" cy="110" r="210" fill="#2563EB" opacity="0.18"/>
  <circle cx="145" cy="560" r="230" fill="#7C3AED" opacity="0.16"/>

  <g filter="url(#shadow)">
    <rect x="90" y="95" width="330" height="485" rx="38" fill="#0D1728" stroke="#26364F" stroke-width="2"/>
    <rect x="123" y="134" width="264" height="48" rx="24" fill="#13233A"/>
    <circle cx="151" cy="158" r="14" fill="#38BDF8"/>
    <text x="174" y="164" fill="#E5F0FF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Telegram Check-in</text>

    <rect x="123" y="225" width="238" height="68" rx="18" fill="#1D4ED8"/>
    <text x="145" y="254" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Done with DSA?</text>
    <text x="145" y="278" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="14">Log progress or ask for help.</text>

    <rect x="154" y="323" width="230" height="76" rx="18" fill="#111C2F" stroke="#334155"/>
    <text x="176" y="354" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Low energy today</text>
    <text x="176" y="378" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="14">Need fallback mode.</text>

    <rect x="123" y="443" width="178" height="52" rx="26" fill="#22C55E"/>
    <text x="157" y="475" fill="#052E16" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Check in</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="118" width="250" height="250" rx="32" fill="#0F1B2D" stroke="#334155" stroke-width="2"/>
    <circle cx="625" cy="210" r="58" fill="#172554" stroke="#60A5FA" stroke-width="4"/>
    <path d="M600 210l18 18 46-54" stroke="#93C5FD" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="556" y="304" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Supervisor</text>
    <text x="555" y="334" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="16">routes to 5 agents</text>
  </g>

  <g stroke="#38BDF8" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <path d="M420 270 C465 270 465 242 500 242"/>
    <path d="M750 230 C800 230 800 170 848 170"/>
    <path d="M750 260 C808 260 808 330 848 330"/>
    <path d="M625 368 C625 420 535 420 535 466"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="848" y="105" width="260" height="130" rx="24" fill="#101B2C" stroke="#334155"/>
    <text x="884" y="151" fill="#E0F2FE" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Pattern Agent</text>
    <text x="884" y="180" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="14">missed workouts, streak risk</text>
    <rect x="884" y="197" width="92" height="8" rx="4" fill="#38BDF8"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="848" y="278" width="260" height="130" rx="24" fill="#101B2C" stroke="#334155"/>
    <text x="884" y="324" fill="#EDE9FE" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Emotional Agent</text>
    <text x="884" y="353" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="14">support before discipline</text>
    <rect x="884" y="370" width="122" height="8" rx="4" fill="#A78BFA"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="435" y="466" width="380" height="118" rx="28" fill="#0F1B2D" stroke="#334155"/>
    <text x="472" y="513" fill="#DCFCE7" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">Weekly AI Report</text>
    <text x="472" y="544" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="15">streaks, achievements, pattern insights</text>
    <rect x="650" y="500" width="105" height="12" rx="6" fill="#22C55E"/>
    <rect x="650" y="528" width="66" height="12" rx="6" fill="#60A5FA"/>
    <rect x="650" y="556" width="135" height="12" rx="6" fill="#A78BFA"/>
  </g>

  <text x="90" y="637" fill="#E5E7EB" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Accountability Agent</text>
  <text x="330" y="637" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="18">multi-agent coaching, gamification, weekly reporting</text>

  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(610 320) rotate(90) scale(430 760)">
      <stop stop-color="#172554" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#07111F" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20" y="-20" width="1300" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
</svg>
